name: Telangana Sand Availability Monitor

on:
  schedule:
    # 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'
    # 2:45 PM IST (9:15 AM UTC - pre-slot check for Karimnagar)
    - cron: '15 9 * * *'
    # 3:00 PM IST (9:30 AM UTC - peak slot opening time)
    - cron: '30 9 * * *'
    # 3:15 PM IST (9:45 AM UTC - peak slot check)
    - cron: '45 9 * * *'
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Send Telegram test alert (bypass deduplication cache)'
        required: false
        type: boolean
        default: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Cache State
        uses: actions/cache@v4
        with:
          path: seen_updates.json
          key: sand-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sand-cache-${{ runner.os }}-

      - name: Run Sand Monitor Check
        env:
          TARGET_URL: 'https://tgmiv.cgg.gov.in/home'
          KEYWORDS: 'Karimnagar,కరీంనగర్,Saidapur,సైదాపూర్,Elabotharam,ఎలబోతారం,Lingapur,లింగాపూర్,Korekal,కోరేకల్'
          ENABLE_TELEGRAM: 'true'
          SECRET_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SECRET_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_FILE: 'seen_updates.json'
        run: |
          export TELEGRAM_BOT_TOKEN="${SECRET_BOT_TOKEN:-8888583463:AAFJz234Cqz4ayoMFzJlsfcoZVVWRGsPqks}"
          export TELEGRAM_CHAT_ID="${SECRET_CHAT_ID:-1311432483}"
          
          echo "Telegram Bot Token Length: ${#TELEGRAM_BOT_TOKEN}, Chat ID: $TELEGRAM_CHAT_ID"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual Trigger: Running in Immediate Test Alert mode..."
            python monitor.py --once --test
          else
            echo "Scheduled Trigger: Running in Cache Deduplication mode..."
            python monitor.py --once
          fi


